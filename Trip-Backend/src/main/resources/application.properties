spring.application.name=triptally

spring.datasource.url=jdbc:postgresql://localhost:5432/triptally
spring.datasource.username=postgres
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=8MB

server.port=8080
server.error.include-message=always

triptally.jwt.secret=${TRIPTALLY_JWT_SECRET:change-me-use-a-long-random-secret-at-least-256-bits-for-production}
triptally.jwt.expiration-ms=86400000
triptally.storage.receipts-dir=${TRIPTALLY_RECEIPTS_DIR:./data/receipts}

logging.level.org.springframework.security=INFO
